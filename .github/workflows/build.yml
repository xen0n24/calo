name: Build Calo IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Neuestes Xcode wählen (iOS 26 SDK braucht Xcode 17+)
      - name: Xcode auswählen
        run: |
          echo "=== Verfügbare Xcode-Versionen ==="
          ls /Applications/ | grep Xcode || echo "(keine Xcode-Installationen gefunden)"
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "FEHLER: Kein Xcode gefunden"; exit 1
          fi
          echo "Verwende: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      # Zeigt verfügbare Schemes — hilft beim Debuggen wenn Build schlägt fehl
      - name: Schemes auflisten
        run: xcodebuild -list 2>&1 || true

      - name: Archive bauen
        run: |
          xcodebuild archive \
            -scheme "Calo" \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Calo.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO

      # xcodebuild legt den Binary bei executableTarget unter usr/local/bin/ ab,
      # nicht in einem .app-Bundle. Wir bauen das Bundle manuell auf.
      - name: IPA packen
        run: |
          BINARY=$(find "$RUNNER_TEMP/Calo.xcarchive/Products" -name "Calo" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "FEHLER: Binary 'Calo' nicht gefunden"
            find "$RUNNER_TEMP/Calo.xcarchive" -type f | head -30
            exit 1
          fi
          echo "Binary gefunden: $BINARY"

          APP_DIR="$RUNNER_TEMP/Payload/Calo.app"
          mkdir -p "$APP_DIR"
          cp "$BINARY" "$APP_DIR/Calo"
          chmod +x "$APP_DIR/Calo"
          cp seed-foods-de.json "$APP_DIR/"

          python3 - "$APP_DIR" <<'PY'
          import plistlib, sys
          plist = {
              'CFBundleIdentifier': 'com.jonathan.calo',
              'CFBundleExecutable': 'Calo',
              'CFBundleName': 'Calo',
              'CFBundleDisplayName': 'Calo',
              'CFBundleVersion': '1',
              'CFBundleShortVersionString': '1.0',
              'MinimumOSVersion': '26.0',
              'CFBundlePackageType': 'APPL',
              'CFBundleSupportedPlatforms': ['iPhoneOS'],
              'UILaunchScreen': {},
              'UISupportedInterfaceOrientations': [
                  'UIInterfaceOrientationPortrait',
                  'UIInterfaceOrientationLandscapeLeft',
                  'UIInterfaceOrientationLandscapeRight',
              ],
              'UISupportedInterfaceOrientations~ipad': [
                  'UIInterfaceOrientationPortrait',
                  'UIInterfaceOrientationLandscapeLeft',
                  'UIInterfaceOrientationLandscapeRight',
                  'UIInterfaceOrientationPortraitUpsideDown',
              ],
          }
          with open(sys.argv[1] + '/Info.plist', 'wb') as f:
              plistlib.dump(plist, f)
          print('Info.plist geschrieben')
          PY

          echo "=== Bundle-Inhalt ==="
          ls -lh "$APP_DIR"

          cd "$RUNNER_TEMP"
          zip -r Calo.ipa Payload
          echo "IPA Größe: $(du -sh Calo.ipa | cut -f1)"

      - name: IPA als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Calo-IPA
          path: ${{ runner.temp }}/Calo.ipa
          retention-days: 30
